  const cityTroopsAvail = currentCity ? currentCity.troops : 0;

  showModal(`
    <div class="modal-box">
      <div class="modal-header">🏯 ${gen.emoji} ${gen.name} 배치
        <span class="modal-close" onclick="closeModal()">✕</span>
      </div>
      <div class="modal-body">
        <div style="margin-bottom:8px;font-size:11px;color:var(--text-dim)">
          현재 위치: <span style="color:var(--gold)">${gen.assignedCity ? REGION_MAP[gen.assignedCity]?.name : '미배치'}</span>
          · 지휘 병력: <span style="color:var(--gold)">${genTroops.toLocaleString()}</span>명
        </div>
        <div style="margin-bottom:10px">
          <div style="color:var(--gold);font-size:11px;margin-bottom:5px">배치할 성 선택</div>
          <select id="deployCity" style="width:100%">${cityOptions}</select>
        </div>
        <div style="margin-bottom:10px">
          <div style="color:var(--gold);font-size:11px;margin-bottom:5px">
            데려갈 병력 <span style="color:var(--text-dim)">(장수 직속: ${genTroops.toLocaleString()} + 현 주둔 도시: ${cityTroopsAvail.toLocaleString()})</span>
          </div>
          <input type="range" id="deployTroops" min="0" max="${genTroops + cityTroopsAvail}"
            value="${genTroops}"
            oninput="document.getElementById('deployTroopsVal').textContent=parseInt(this.value).toLocaleString()">
          <div style="display:flex;justify-content:space-between;font-size:11px">
            <span style="color:var(--text-dim)">데려갈 병력</span>
            <span style="color:var(--gold)"><span id="deployTroopsVal">${genTroops.toLocaleString()}</span>명</span>
          </div>
        </div>
        <div style="font-size:11px;color:var(--text-dim);background:rgba(0,0,0,0.3);padding:8px;border:1px solid var(--border)">
          💡 남은 병력은 현재 주둔 성에 자동으로 배치됩니다.<br>
          통솔력이 높을수록 더 많은 병력을 효율적으로 지휘할 수 있습니다.
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-gray" onclick="closeModal()">취소</button>
        <button class="btn btn-primary" onclick="executeDeployGeneral('${genId}')">배치</button>
      </div>
    </div>
  `);
}

function executeDeployGeneral(genId) {
  const gen = G.generals[genId];
  const targetCityId = document.getElementById('deployCity').value;
  const deployTroops = parseInt(document.getElementById('deployTroops').value);
  const targetCity = G.cities[targetCityId];

  // Check troops available (gen's own + current city garrison)
  const prevCityId = gen.assignedCity;
  const prevCity = prevCityId ? G.cities[prevCityId] : null;
  const totalAvail = gen.troops + (prevCity ? prevCity.troops : 0);

  if(deployTroops > totalAvail) { showNotification('병력이 부족합니다', 'danger'); return; }

  // Deduct from current city if needed
  const fromGenTroops = Math.min(deployTroops, gen.troops);
  const fromCityTroops = deployTroops - fromGenTroops;

  if(prevCity && fromCityTroops > 0) {
    if(prevCity.troops < fromCityTroops) { showNotification('주둔 병력이 부족합니다', 'danger'); return; }
    prevCity.troops -= fromCityTroops;
  }

  // Remaining gen troops stay at old city as garrison
  const leftBehind = gen.troops - fromGenTroops;
  if(prevCity && leftBehind > 0) prevCity.troops += leftBehind;

  // Deploy
  gen.troops = deployTroops;
  gen.assignedCity = targetCityId;

  const prevName = prevCityId ? REGION_MAP[prevCityId]?.name : '미배치';
  const targetName = REGION_MAP[targetCityId]?.name;
  addLog(`🏯 ${gen.name} → ${targetName} 배치 완료 (병력 ${deployTroops.toLocaleString()}명, 구 주둔지 잔류 ${leftBehind.toLocaleString()}명)`, 'success');
  closeModal();
  renderAll();
}

// =============================================
// REWARD GENERAL (boost loyalty)
// =============================================
function openRewardGeneralModal(genId) {
  const gen = G.generals[genId];
  if(!gen) return;
  const pf = G.factions[G.playerId];

  showModal(`
    <div class="modal-box">
      <div class="modal-header">🎁 ${gen.emoji} ${gen.name} 포상
        <span class="modal-close" onclick="closeModal()">✕</span>
      </div>
      <div class="modal-body">
        <div class="info-row"><span class="lbl">현재 충성도</span><span class="val" style="color:${gen.loyalty<25?'#ff6b6b':gen.loyalty<50?'#ffd700':'#6bff6b'}">${gen.loyalty}</span></div>
        <div class="info-row"><span class="lbl">보유 금</span><span class="val">${pf.gold.toLocaleString()}</span></div>
        <div style="margin-top:10px">
          <div style="color:var(--gold);font-size:11px;margin-bottom:5px">포상 금액</div>
          <select id="rewardAmount" style="width:100%">
            <option value="500">소량 (500금) → 충성 +5</option>
            <option value="1500" selected>보통 (1500금) → 충성 +12</option>
            <option value="3000">후한 (3000금) → 충성 +22</option>
            <option value="6000">극진 (6000금) → 충성 +40</option>
          </select>
        </div>
        <div style="margin-top:8px;font-size:11px;color:var(--text-dim)">
          ※ 충성도 25 미만이면 사직 위험, 10 미만이면 반란 위험이 있습니다.
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-gray" onclick="closeModal()">취소</button>
        <button class="btn btn-gold" onclick="executeReward('${genId}')">포상</button>
      </div>
    </div>
  `);
}

function executeReward(genId) {
  const gen = G.generals[genId];
  const pf = G.factions[G.playerId];
  const sel = document.getElementById('rewardAmount');
  const cost = parseInt(sel.value);
  const bonuses = {500:5, 1500:12, 3000:22, 6000:40};
  const loyaltyBonus = bonuses[cost] || 12;

  if(pf.gold < cost) { showNotification('금이 부족합니다', 'danger'); return; }
  pf.gold -= cost;
  gen.loyalty = Math.min(100, gen.loyalty + loyaltyBonus);
  addLog(`🎁 ${gen.name}에게 ${cost.toLocaleString()}금 포상! 충성 +${loyaltyBonus} → ${gen.loyalty}`, 'success');
  closeModal();
  renderAll();
}

// =============================================
// SEARCH CITY FOR HIDDEN GENERALS
// =============================================
function openSearchCityModal() {
  if(!G.selectedCity) { showNotification('탐색할 지역을 선택하세요', 'danger'); return; }
  const city = G.cities[G.selectedCity];
  const region = REGION_MAP[G.selectedCity];
  const pf = G.factions[G.playerId];
  const searchCost = 800;

  showModal(`
    <div class="modal-box">
      <div class="modal-header">🔍 ${region.name} 인재 탐색
        <span class="modal-close" onclick="closeModal()">✕</span>
      </div>
      <div class="modal-body">
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:12px;line-height:1.6">
          재야에 숨은 인재를 찾아봅니다.<br>
          명성이 높을수록, 지역 개발도가 높을수록 인재를 발견할 확률이 높아집니다.
        </div>
        <div class="info-row"><span class="lbl">탐색 비용</span><span class="val">${searchCost}금</span></div>
        <div class="info-row"><span class="lbl">보유 금</span><span class="val">${pf.gold.toLocaleString()}</span></div>
        <div class="info-row"><span class="lbl">나의 명성</span><span class="val">${pf.fame}</span></div>
        <div class="info-row"><span class="lbl">지역 개발도</span><span class="val">${city.development}%</span></div>
        <div style="margin-top:8px;font-size:11px">
          발견 확률: <span style="color:var(--gold)">${Math.min(90, Math.floor(20 + pf.fame * 0.3 + city.development * 0.3))}%</span>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-gray" onclick="closeModal()">취소</button>
        <button class="btn btn-primary" onclick="executeSearchCity()">탐색 (${searchCost}금)</button>
      </div>
    </div>
  `);
}

function executeSearchCity() {
  const pf = G.factions[G.playerId];
  const searchCost = 800;
  if(pf.gold < searchCost) { showNotification('금이 부족합니다', 'danger'); return; }

  const city = G.cities[G.selectedCity];
  const discoverChance = Math.min(0.9, 0.2 + pf.fame * 0.003 + city.development * 0.003);

  pf.gold -= searchCost;

  if(Math.random() > discoverChance) {
    addLog(`🔍 ${REGION_MAP[G.selectedCity].name} 탐색 - 인재를 찾지 못했습니다`, 'default');
    closeModal();
    showNotification('인재를 찾지 못했습니다', '');
    return;
  }

  // Find a free general (not yet recruited, not rebels)
  const candidates = Object.values(G.generals).filter(g =>
    !g.isRecruited && !g.rebels && g.role !== 'ruler'
  );

  if(candidates.length === 0) {
    addLog(`🔍 ${REGION_MAP[G.selectedCity].name} 탐색 - 더 이상 재야 인재가 없습니다`, 'default');
    closeModal();
    return;
  }

  // Pick a random candidate, weighted by stat total
  const candidate = candidates[Math.floor(Math.random() * Math.min(candidates.length, 5))];
  const statTotal = candidate.wu + candidate.zhi + candidate.tong + candidate.pol;
  const recruitCost = statTotal * 15;
  const fameReq = Math.floor(statTotal / 4) - 10;

  closeModal();

  // Show recruit option
  showModal(`
    <div class="modal-box">
      <div class="modal-header">✨ 인재 발견!
        <span class="modal-close" onclick="closeModal()">✕</span>
      </div>
      <div class="modal-body">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
          <div style="font-size:40px;background:rgba(201,168,76,0.1);border:1px solid var(--gold);width:60px;height:60px;display:flex;align-items:center;justify-content:center">${candidate.emoji}</div>
          <div>
            <div style="font-family:'Noto Serif KR';font-size:18px;color:var(--gold)">${candidate.name}</div>
            <div style="font-size:11px;color:var(--text-dim)">${getRoleName(candidate.role)} · ${candidate.bio}</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:10px">
          <div class="stat-box"><div class="s-label">무력</div><div class="s-val" style="color:${candidate.wu>=90?'#ff6b6b':candidate.wu>=70?'#ffd700':'#e8d5a0'}">${candidate.wu}</div></div>
          <div class="stat-box"><div class="s-label">지력</div><div class="s-val" style="color:${candidate.zhi>=90?'#6bb5ff':candidate.zhi>=70?'#a0c8ff':'#e8d5a0'}">${candidate.zhi}</div></div>
          <div class="stat-box"><div class="s-label">통솔</div><div class="s-val" style="color:${candidate.tong>=90?'#6bff6b':candidate.tong>=70?'#a0ffa0':'#e8d5a0'}">${candidate.tong}</div></div>
          <div class="stat-box"><div class="s-label">정치</div><div class="s-val" style="color:${candidate.pol>=90?'#ff9fff':candidate.pol>=70?'#d0a0ff':'#e8d5a0'}">${candidate.pol}</div></div>
        </div>
        <div style="font-size:11px;color:var(--text-dim);margin-bottom:4px">특기: ${candidate.skills.join(', ')}</div>
        <div class="info-row"><span class="lbl">영입 비용</span><span class="val">${recruitCost.toLocaleString()}금</span></div>
        <div class="info-row"><span class="lbl">필요 명성</span><span class="val">${Math.max(0, fameReq)}</span></div>
        <div class="info-row"><span class="lbl">보유 금</span><span class="val ${pf.gold >= recruitCost ? 'good' : 'bad'}">${pf.gold.toLocaleString()}</span></div>
        <div class="info-row"><span class="lbl">나의 명성</span><span class="val ${pf.fame >= Math.max(0,fameReq) ? 'good' : 'bad'}">${pf.fame}</span></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-gray" onclick="closeModal()">보내기</button>
        <button class="btn btn-gold" onclick="recruitDiscoveredGeneral('${candidate.id}', ${recruitCost}, ${Math.max(0,fameReq)})"
          ${pf.gold < recruitCost || pf.fame < Math.max(0,fameReq) ? 'disabled style="opacity:0.4;cursor:not-allowed"' : ''}>
          영입 (${recruitCost.toLocaleString()}금)
        </button>
      </div>
    </div>
  `);
}

function recruitDiscoveredGeneral(genId, cost, fameReq) {
  const pf = G.factions[G.playerId];
  const gen = G.generals[genId];
  if(!gen) return;
  if(pf.gold < cost) { showNotification('금이 부족합니다', 'danger'); return; }
  if(pf.fame < fameReq) { showNotification('명성이 부족합니다', 'danger'); return; }

  pf.gold -= cost;
  gen.isRecruited = true;
  gen.freeAgent = false;
  gen.rebels = false;
  gen.factionId = G.playerId;
  gen.loyalty = 65 + Math.floor(Math.random() * 20);
  gen.troops = 500 + Math.floor(Math.random() * 1500);
  gen.assignedCity = G.selectedCity || getPlayerCities()[0]?.id || null;

  if(!pf.generals.includes(genId)) pf.generals.push(genId);

  addLog(`✨ ${gen.name} 영입 성공! (금 -${cost.toLocaleString()}) 충성:${gen.loyalty}`, 'success');
  showNotification(`✨ ${gen.name} 합류!`, '');
  closeModal();
  renderAll();
}

console.log('확장 시스템 로드 완료');
</script>
</body>
</html>

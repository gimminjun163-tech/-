<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>삼국지 - 천하통일</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&display=swap');

:root {
  --gold: #c9a84c;
  --dark-gold: #8b6914;
  --red: #8b1a1a;
  --dark-red: #5c0a0a;
  --bg-dark: #0a0a0f;
  --bg-panel: #12100e;
  --bg-card: #1a1710;
  --border: #3a2e1a;
  --text: #e8d5a0;
  --text-dim: #8a7050;
  --green: #2d6e2d;
  --blue: #1a3a6e;
  --teal: #1a5a5a;
  --purple: #4a1a6e;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-dark);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px;
  overflow: hidden;
  height: 100vh;
  background-image: 
    radial-gradient(ellipse at 20% 50%, rgba(139,26,26,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.05) 0%, transparent 50%);
}

/* TITLE SCREEN */
#titleScreen {
  position: fixed; inset: 0;
  background: #0a0a0f;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 1000;
  background-image: 
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}

.title-main {
  font-family: 'Noto Serif KR', serif;
  font-size: 72px;
  font-weight: 900;
  color: var(--gold);
  text-shadow: 0 0 40px rgba(201,168,76,0.5), 0 0 80px rgba(201,168,76,0.2);
  letter-spacing: 20px;
  animation: titlePulse 3s ease-in-out infinite;
}

@keyframes titlePulse {
  0%,100% { text-shadow: 0 0 40px rgba(201,168,76,0.5); }
  50% { text-shadow: 0 0 60px rgba(201,168,76,0.8), 0 0 100px rgba(201,168,76,0.4); }
}

.title-sub {
  font-family: 'Noto Serif KR', serif;
  font-size: 24px;
  color: var(--text-dim);
  letter-spacing: 8px;
  margin-top: 10px;
}

.title-divider {
  width: 400px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 30px 0;
}

.scenario-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 500px;
  margin-bottom: 20px;
}

.scenario-btn {
  background: rgba(201,168,76,0.05);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 14px 20px;
  cursor: pointer;
  font-family: 'Noto Serif KR', serif;
  font-size: 14px;
  text-align: left;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  gap: 15px;
}

.scenario-btn:hover {
  background: rgba(201,168,76,0.15);
  border-color: var(--gold);
  transform: translateX(5px);
}

.scenario-year {
  color: var(--gold);
  font-size: 12px;
  min-width: 60px;
}

/* MAIN GAME LAYOUT */
#gameScreen {
  display: none;
  height: 100vh;
  grid-template-columns: 220px 1fr 240px;
  grid-template-rows: 40px 1fr 160px;
  gap: 2px;
  background: #050505;
  padding: 2px;
}

#gameScreen.active {
  display: grid;
}

/* TOP BAR */
#topBar {
  grid-column: 1/-1;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 15px;
}

.stat-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(0,0,0,0.3);
  padding: 3px 10px;
  border: 1px solid var(--border);
  font-size: 11px;
  white-space: nowrap;
}

.stat-chip .label { color: var(--text-dim); }
.stat-chip .val { color: var(--gold); font-weight: 700; }

#dateDisplay {
  font-family: 'Noto Serif KR', serif;
  color: var(--gold);
  font-size: 13px;
  font-weight: 700;
  margin-left: auto;
}

.top-btn {
  background: rgba(139,26,26,0.3);
  border: 1px solid var(--red);
  color: var(--text);
  padding: 3px 10px;
  cursor: pointer;
  font-size: 11px;
  transition: all 0.2s;
}

.top-btn:hover { background: rgba(139,26,26,0.6); }
.top-btn.gold { background: rgba(201,168,76,0.2); border-color: var(--gold); }
.top-btn.gold:hover { background: rgba(201,168,76,0.4); }

/* LEFT PANEL */
#leftPanel {
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.panel-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 13px;
  color: var(--gold);
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* MAP */
#mapContainer {
  background: var(--bg-dark);
  position: relative;
  overflow: hidden;
}

#mapSvg {
  width: 100%;
  height: 100%;
  cursor: default;
}

.city-node {
  cursor: pointer;
  transition: all 0.2s;
}

.city-node:hover .city-circle {
  filter: brightness(1.5);
}

.city-circle {
  transition: all 0.2s;
}

.city-label {
  font-family: 'Noto Serif KR', serif;
  font-size: 9px;
  fill: #fff;
  text-anchor: middle;
  pointer-events: none;
  text-shadow: 0 0 3px #000;
}

.city-troops {
  font-size: 7px;
  fill: #ffd700;
  text-anchor: middle;
  pointer-events: none;
}

.attack-arrow {
  stroke-width: 2;
  fill: none;
  stroke-dasharray: 5,3;
  animation: dashMove 1s linear infinite;
  pointer-events: none;
}

@keyframes dashMove {
  from { stroke-dashoffset: 0; }
  to { stroke-dashoffset: -16; }
}

.route-line {
  stroke: var(--gold);
  stroke-width: 1;
  stroke-dasharray: 4,3;
  fill: none;
  opacity: 0.5;
  pointer-events: none;
}

/* RIGHT PANEL */
#rightPanel {
  background: var(--bg-panel);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

/* BOTTOM LOG */
#bottomLog {
  grid-column: 1/-1;
  background: var(--bg-panel);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 2px;
}

#eventLog {
  flex: 1;
  overflow-y: auto;
  padding: 5px 10px;
  font-size: 11px;
  line-height: 1.6;
}

#eventLog .log-entry {
  padding: 2px 0;
  border-bottom: 1px solid rgba(58,46,26,0.3);
  display: flex;
  gap: 8px;
}

.log-date { color: var(--text-dim); min-width: 70px; }
.log-msg { color: var(--text); }
.log-msg.combat { color: #ff6b6b; }
.log-msg.diplo { color: #6bb5ff; }
.log-msg.event { color: #ffd700; }
.log-msg.warning { color: #ff9900; }
.log-msg.success { color: #6bff6b; }

#actionPanel {
  width: 200px;
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 5px;
  gap: 4px;
  overflow-y: auto;
}

.action-btn {
  background: rgba(201,168,76,0.1);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 8px;
  cursor: pointer;
  font-size: 11px;
  text-align: left;
  transition: all 0.2s;
  font-family: 'Noto Sans KR', sans-serif;
  display: flex;
  align-items: center;
  gap: 6px;
}

.action-btn:hover:not(:disabled) {
  background: rgba(201,168,76,0.25);
  border-color: var(--gold);
}

.action-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.action-btn.danger {
  background: rgba(139,26,26,0.2);
  border-color: var(--red);
}

.action-btn.danger:hover:not(:disabled) {
  background: rgba(139,26,26,0.5);
}

.action-btn .btn-icon { font-size: 13px; }

/* CITY INFO */
.city-info-box {
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
}

.city-info-name {
  font-family: 'Noto Serif KR', serif;
  font-size: 16px;
  color: var(--gold);
  margin-bottom: 5px;
}

.info-row {
  display: flex;
  justify-content: space-between;
  padding: 2px 0;
  font-size: 11px;
  border-bottom: 1px solid rgba(58,46,26,0.2);
}

.info-row .lbl { color: var(--text-dim); }
.info-row .val { color: var(--text); }
.info-row .val.good { color: #6bff6b; }
.info-row .val.bad { color: #ff6b6b; }
.info-row .val.warn { color: #ffd700; }

/* GENERAL CARD */
.general-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: 6px 8px;
  margin: 3px;
  cursor: pointer;
  transition: all 0.2s;
}

.general-card:hover {
  border-color: var(--gold);
  background: rgba(201,168,76,0.08);
}

.general-card.selected {
  border-color: var(--gold);
  background: rgba(201,168,76,0.15);
}

.gen-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}

.gen-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.gen-name {
  font-family: 'Noto Serif KR', serif;
  font-size: 13px;
  color: var(--gold);
}

.gen-role {
  font-size: 10px;
  color: var(--text-dim);
  background: rgba(0,0,0,0.3);
  padding: 1px 5px;
  border: 1px solid var(--border);
}

.gen-stats {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 2px;
  font-size: 10px;
}

.stat-box {
  text-align: center;
  background: rgba(0,0,0,0.3);
  padding: 2px;
}

.stat-box .s-label { color: var(--text-dim); font-size: 9px; }
.stat-box .s-val { color: var(--gold); font-weight: 700; }

.gen-loyalty {
  margin-top: 3px;
  height: 3px;
  background: rgba(0,0,0,0.5);
  border-radius: 2px;
  overflow: hidden;
}

.gen-loyalty-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.5s;
}

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-box {
  background: var(--bg-panel);
  border: 1px solid var(--gold);
  min-width: 420px;
  max-width: 700px;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 0 40px rgba(201,168,76,0.2);
}

.modal-header {
  background: rgba(201,168,76,0.1);
  padding: 10px 15px;
  font-family: 'Noto Serif KR', serif;
  font-size: 16px;
  color: var(--gold);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-close {
  cursor: pointer;
  color: var(--text-dim);
  font-size: 18px;
  transition: color 0.2s;
}

.modal-close:hover { color: var(--red); }

.modal-body {
  padding: 15px;
}

.modal-footer {
  padding: 10px 15px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

.btn {
  padding: 6px 16px;
  cursor: pointer;
  font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.2s;
  border: 1px solid;
}

.btn-primary {
  background: rgba(139,26,26,0.6);
  border-color: var(--red);
  color: var(--text);
}

.btn-primary:hover { background: rgba(139,26,26,0.9); }

.btn-gold {
  background: rgba(201,168,76,0.2);
  border-color: var(--gold);
  color: var(--gold);
}

.btn-gold:hover { background: rgba(201,168,76,0.4); }

.btn-gray {
  background: rgba(100,100,100,0.2);
  border-color: #555;
  color: var(--text-dim);
}

.btn-gray:hover { background: rgba(100,100,100,0.4); }

/* SLIDERS */
input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  background: var(--border);
  outline: none;
  border-radius: 2px;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  background: var(--gold);
  border-radius: 50%;
  cursor: pointer;
}

input[type=number], input[type=text], select {
  background: var(--bg-dark);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 8px;
  font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  outline: none;
}

input[type=number]:focus, input[type=text]:focus, select:focus {
  border-color: var(--gold);
}

select option {
  background: var(--bg-dark);
}

/* TABS */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}

.tab-btn {
  flex: 1;
  padding: 6px;
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 11px;
  transition: all 0.2s;
  border-bottom: 2px solid transparent;
}

.tab-btn.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
  background: rgba(201,168,76,0.05);
}

/* PROGRESS BARS */
.prog-bar {
  height: 6px;
  background: rgba(0,0,0,0.5);
  border-radius: 3px;
  overflow: hidden;
  margin: 2px 0;
}

.prog-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s;
}

/* NOTIFICATION */
.notification {
  position: fixed;
  top: 50px;
  right: 20px;
  background: var(--bg-panel);
  border: 1px solid var(--gold);
  padding: 10px 15px;
  z-index: 600;
  min-width: 250px;
  font-size: 12px;
  animation: slideIn 0.3s ease;
  box-shadow: 0 0 20px rgba(201,168,76,0.3);
}

.notification.danger { border-color: var(--red); box-shadow: 0 0 20px rgba(139,26,26,0.3); }
.notification.success { border-color: #2d6e2d; box-shadow: 0 0 20px rgba(45,110,45,0.3); }

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--dark-gold); }

/* TOOLTIP */
.tooltip {
  position: absolute;
  background: var(--bg-panel);
  border: 1px solid var(--gold);
  padding: 6px 10px;
  font-size: 11px;
  z-index: 700;
  pointer-events: none;
  max-width: 200px;
  box-shadow: 0 0 15px rgba(0,0,0,0.8);
}

/* FACTION COLORS */
.faction-wei { fill: #1a3a6e; stroke: #4a7ace; }
.faction-shu { fill: #1a5a2a; stroke: #4ace6a; }
.faction-wu { fill: #6e1a1a; stroke: #ce4a4a; }
.faction-han { fill: #5a5a1a; stroke: #cece4a; }
.faction-neutral { fill: #2a2a2a; stroke: #6a6a6a; }
.faction-yellow { fill: #5a3a1a; stroke: #ce8a4a; }
.faction-dong { fill: #4a1a5a; stroke: #9a4ace; }
.faction-player { fill: #4a1a1a; stroke: #ce4a4a; }

.fc-wei { color: #4a7ace; }
.fc-shu { color: #4ace6a; }
.fc-wu { color: #ce4a4a; }
.fc-han { color: #cece4a; }
.fc-neutral { color: #aaaaaa; }

/* WEATHER DISPLAY */
#weatherDisplay {
  position: absolute;
  top: 5px;
  right: 5px;
  font-size: 20px;
  opacity: 0.7;
  pointer-events: none;
}

/* SEASON INDICATOR */
#seasonDisplay {
  position: absolute;
  top: 5px;
  left: 5px;
  font-size: 10px;
  color: var(--gold);
  background: rgba(0,0,0,0.6);
  padding: 2px 6px;
  border: 1px solid var(--border);
  pointer-events: none;
}

/* ARMY MOVEMENT INDICATOR */
.army-dot {
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--red);
  border: 2px solid #fff;
  pointer-events: none;
  transition: all 2s linear;
  z-index: 10;
}

/* GRID LINES ON MAP */
.map-grid {
  stroke: rgba(201,168,76,0.05);
  stroke-width: 0.5;
}

.territory-region {
  opacity: 0.3;
  transition: opacity 0.3s;
}

.territory-region:hover {
  opacity: 0.5;
}

/* BATTLE ANIMATION */
@keyframes battleFlash {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.in-battle {
  animation: battleFlash 0.5s ease infinite;
}

/* FATIGUE BAR */
.fatigue-bar {
  height: 3px;
  background: rgba(0,0,0,0.5);
  border-radius: 2px;
  overflow: hidden;
}

.fatigue-fill {
  height: 100%;
  border-radius: 2px;
  background: linear-gradient(90deg, #ff6b00, #ff0000);
  transition: width 0.3s;
}

/* CHAR SELECT */
.char-select-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin: 10px 0;
}

.char-select-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: 8px;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}

.char-select-card:hover, .char-select-card.selected {
  border-color: var(--gold);
  background: rgba(201,168,76,0.1);
}

.char-select-card .avatar { font-size: 24px; margin-bottom: 4px; }
.char-select-card .cname { font-family: 'Noto Serif KR', serif; font-size: 12px; color: var(--gold); }
.char-select-card .cfaction { font-size: 10px; color: var(--text-dim); }

/* DIPLOMACY TABLE */
.diplo-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
}

.diplo-table th {
  background: rgba(0,0,0,0.3);
  padding: 5px 8px;
  color: var(--gold);
  border-bottom: 1px solid var(--border);
  text-align: left;
}

.diplo-table td {
  padding: 4px 8px;
  border-bottom: 1px solid rgba(58,46,26,0.2);
}

.rel-allied { color: #4ace6a; }
.rel-neutral { color: #cece4a; }
.rel-hostile { color: #ce4a4a; }
.rel-vassal { color: #4a7ace; }

/* MINI MAP */
#miniMap {
  position: absolute;
  bottom: 5px;
  right: 5px;
  width: 120px;
  height: 80px;
  background: rgba(0,0,0,0.7);
  border: 1px solid var(--border);
  overflow: hidden;
}

/* HOVER INFO */
#hoverInfo {
  position: absolute;
  background: var(--bg-panel);
  border: 1px solid var(--gold);
  padding: 8px 12px;
  font-size: 11px;
  z-index: 400;
  pointer-events: none;
  display: none;
  min-width: 160px;
  box-shadow: 0 0 15px rgba(0,0,0,0.8);
}

/* LOADING */
.loading-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 20px;
}

.loading-spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* BATTLE LOG */
.battle-log-entry {
  padding: 3px 0;
  font-size: 11px;
  line-height: 1.5;
}

.battle-log-entry.hit { color: #ff6b6b; }
.battle-log-entry.miss { color: #888; }
.battle-log-entry.tactic { color: #ffd700; }
.battle-log-entry.morale { color: #6bb5ff; }

/* CHARACTER PORTRAIT FRAME */
.portrait-frame {
  width: 50px;
  height: 50px;
  border: 2px solid var(--gold);
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  position: relative;
  flex-shrink: 0;
}

.portrait-frame::before, .portrait-frame::after {
  content: '';
  position: absolute;
  width: 8px;
  height: 8px;
  border: 2px solid var(--gold);
}

.portrait-frame::before { top: -3px; left: -3px; border-right: none; border-bottom: none; }
.portrait-frame::after { bottom: -3px; right: -3px; border-left: none; border-top: none; }

/* TURN INDICATOR */
#turnIndicator {
  position: fixed;
  bottom: 170px;
  right: 20px;
  background: var(--bg-panel);
  border: 1px solid var(--gold);
  padding: 5px 15px;
  font-family: 'Noto Serif KR', serif;
  font-size: 12px;
  color: var(--gold);
  z-index: 100;
  pointer-events: none;
}

/* SELECTED CITY HIGHLIGHT */
.city-selected circle {
  filter: drop-shadow(0 0 8px var(--gold));
}

/* ARMY LABEL */
.army-label {
  font-size: 8px;
  fill: white;
  text-anchor: middle;
  font-weight: bold;
  pointer-events: none;
  text-shadow: 0 0 3px black;
}

/* REGION BORDER */
.region-border {
  fill: none;
  stroke-width: 1.5;
  stroke-dasharray: none;
}

/* HEADER DECORATION */
.panel-title::before {
  content: '◆';
  color: var(--dark-gold);
  font-size: 8px;
  margin-right: 5px;
}

/* TABS IN RIGHT PANEL */
.right-tab-content {
  display: none;
  flex: 1;
  overflow-y: auto;
}

.right-tab-content.active {
  display: block;
}

/* EVENT BANNER */
.event-banner {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--bg-panel);
  border: 2px solid var(--gold);
  padding: 30px 40px;
  z-index: 600;
  text-align: center;
  min-width: 400px;
  max-width: 600px;
  box-shadow: 0 0 60px rgba(201,168,76,0.4);
  animation: eventAppear 0.5s ease;
}

@keyframes eventAppear {
  from { transform: translate(-50%, -60%); opacity: 0; }
  to { transform: translate(-50%, -50%); opacity: 1; }
}

.event-banner h2 {
  font-family: 'Noto Serif KR', serif;
  font-size: 22px;
  color: var(--gold);
  margin-bottom: 15px;
}

.event-banner p {
  font-size: 13px;
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 20px;
}

/* SPECIAL BUTTON */
.next-day-btn {
  background: linear-gradient(135deg, rgba(139,26,26,0.5), rgba(201,168,76,0.2));
  border: 1px solid var(--gold);
  color: var(--gold);
  padding: 5px 20px;
  cursor: pointer;
  font-family: 'Noto Serif KR', serif;
  font-size: 13px;
  transition: all 0.3s;
  letter-spacing: 2px;
}

.next-day-btn:hover {
  background: linear-gradient(135deg, rgba(139,26,26,0.8), rgba(201,168,76,0.4));
  box-shadow: 0 0 15px rgba(201,168,76,0.3);
}

/* LOYALTY WARNING PULSE */
@keyframes loyaltyWarn {
  0%,100% { box-shadow: none; }
  50% { box-shadow: 0 0 8px rgba(255,50,50,0.6); }
}

.general-card.loyalty-warn {
  animation: loyaltyWarn 1.5s ease infinite;
  border-color: rgba(255,80,80,0.5) !important;
}

.free-agent-badge {
  display: inline-block;
  font-size: 9px;
  background: rgba(201,168,76,0.2);
  border: 1px solid var(--gold);
  color: var(--gold);
  padding: 1px 5px;
  margin-left: 4px;
  vertical-align: middle;
}

.stat-box .s-val.high { color: #6bff6b; }
.stat-box .s-val.mid  { color: #ffd700; }
.stat-box .s-val.low  { color: #e8d5a0; }
</style>
</head>

let G = {};

function initGameState(scenarioIdx, playerId) {
  const sc = SCENARIOS[scenarioIdx];
  const playerChoice = sc.playerChoices.find(p => p.id === playerId);
  
  // Initialize cities
  const cities = {};
  REGIONS.forEach(r => {
    cities[r.id] = {
      ...r,
      owner: 'neutral',
      troops: Math.floor(r.population * 0.1),
      maxTroops: Math.floor(r.population * 0.5),
      gold: Math.floor(r.population * 0.2),
      food: Math.floor(r.population * 0.3),
      horses: Math.floor(r.population * 0.02),
      defense: r.defBonus,
      development: 50, // 0-100
      stability: 70, // 0-100
      governor: null, // general id
      garrisonGenerals: [],
    };
  });
  
  // Assign cities to factions
  const factions = {};
  // Build base factions from scenario
  Object.entries(sc.factions).forEach(([fid, fdata]) => {
    factions[fid] = {
      id: fid, name: fdata.name, color: fdata.color,
      gold: fdata.resources.gold, food: fdata.resources.food, horses: fdata.resources.horse,
      generals: [...fdata.generals],
      relations: {}, // factionId -> {type, value}
      fame: 50,
      isPlayer: false,
    };
    fdata.cities.forEach(cid => {
      if(cities[cid]) cities[cid].owner = fid;
    });
  });
  
  // Player faction - starting companions by character
  const playerFactionId = 'player';

  // Define starting companions for each playable character
  const startingCompanions = {
    // 황건적의 난
    liubei:    ['guanyu','zhangfei'],
    caocao:    ['xiahou_dun','dian_wei','guo_jia'],
    sun_jian:  ['cheng_pu','han_dang','huang_gai'],
    gongsun_zan: [],
    // 동탁의 폭정
    lv_bu:     ['chen_gong'],
    sunquan:   ['zhou_yu','lu_su'],
    yuanshao:  ['yan_liang','tian_feng'],
    // 관도 대전
    // (caocao, liubei, yuanshao, sunquan already covered)
    // 적벽 대전
    zhuge_liang: ['liubei','zhao_yun','zhangfei'],
  };

  // Scenario-based extra companions if choice matches
  const scenarioExtraCompanions = {
    0: { // 황건적의 난
      liubei: ['guanyu','zhangfei'],
      caocao: ['xiahou_dun','xiahou_yuan','dian_wei','guo_jia','xun_yu'],
      sun_jian: ['cheng_pu','han_dang','huang_gai','taishi_ci'],
      gongsun_zan: [],
    },
    1: { // 동탁의 폭정
      caocao: ['xiahou_dun','xiahou_yuan','dian_wei','xu_chu','guo_jia','xun_yu'],
      liubei: ['guanyu','zhangfei','zhao_yun'],
      sunquan: ['zhou_yu','lu_su','gan_ning','huang_gai','cheng_pu'],
      lv_bu:  ['chen_gong'],
    },
    2: { // 관도 대전
      caocao: ['xiahou_dun','zhang_liao','xu_huang','cao_ren','guo_jia','jia_xu','xu_chu','zhang_he'],
      liubei: ['guanyu','zhangfei','zhao_yun'],
      yuanshao: ['yan_liang','wen_chou','tian_feng','ju_shou'],
      sunquan: ['zhou_yu','lu_su','gan_ning','taishi_ci','huang_gai','lu_meng'],
    },
    3: { // 적벽 대전
      caocao: ['xiahou_dun','zhang_liao','xu_huang','cao_ren','jia_xu','xu_chu','zhang_he','sima_yi','li_dian','yue_jin'],
      sunquan: ['zhou_yu','lu_su','lu_meng','gan_ning','taishi_ci','huang_gai','cheng_pu','han_dang','zhou_tai','lu_xun'],
      liubei: ['guanyu','zhangfei','zhao_yun','pang_tong','wei_yan','huang_zhong'],
      zhuge_liang: ['liubei','guanyu','zhangfei','zhao_yun','wei_yan','huang_zhong'],
    },
  };

  // Get companions for this scenario + character
  const companions = (scenarioExtraCompanions[scenarioIdx] && scenarioExtraCompanions[scenarioIdx][playerId])
    ? scenarioExtraCompanions[scenarioIdx][playerId]
    : (startingCompanions[playerId] || []);

  // Build player generals list: leader + companions (remove any that belong to other factions)
  const playerGeneralIds = [playerId, ...companions.filter(gid => {
    // Don't steal generals already in another faction that will remain in game
    return true; // Allow - we'll remove from other factions below
  })];

  factions[playerFactionId] = {
    id: playerFactionId, name: playerChoice.name + '의 세력',
    color: '#ce4a4a',
    gold: 12000, food: 15000, horses: 2000,
    generals: playerGeneralIds,
    relations: {},
    fame: 30,
    isPlayer: true,
  };
  cities[playerChoice.startCity].owner = playerFactionId;
  cities[playerChoice.startCity].troops = 5000;

  // Remove player and companions from other factions
  Object.values(factions).forEach(f => {
    if(f.id !== playerFactionId) {
      f.generals = f.generals.filter(g => !playerGeneralIds.includes(g));
    }
  });
  
  // Initialize relations
  Object.keys(factions).forEach(fid => {
    factions[fid].relations = {};
    Object.keys(factions).forEach(fid2 => {
      if(fid !== fid2) {
        factions[fid].relations[fid2] = { type:'neutral', value:50 };
      }
    });
  });
  
  // Initialize generals
  const generals = {};
  GENERAL_TEMPLATES.forEach(gt => {
    generals[gt.id] = {
      ...gt,
      hp: 100, maxHp: 100,
      exp: 0, level: 1,
      loyalty: 80 + Math.floor(Math.random()*20),
      morale: 80,
      fatigue: 0,
      troops: 0,
      food: 0,
      assignedCity: null,
      inBattle: false,
      isRecruited: false,
      skills: [gt.special],
      knownBy: [],
    };
  });
  
  // Assign generals to factions
  Object.values(factions).forEach(f => {
    f.generals.forEach((gid, idx) => {
      if(generals[gid]) {
        generals[gid].isRecruited = true;
        generals[gid].factionId = f.id;
        generals[gid].freeAgent = false;
        generals[gid].rebels = false;
        if(f.id === playerFactionId) {
          // Player generals: leader gets more troops, companions get varied
          if(gid === playerId) {
            generals[gid].troops = 3000;
            generals[gid].assignedCity = playerChoice.startCity;
            generals[gid].loyalty = 100;
          } else {
            generals[gid].troops = 500 + Math.floor(Math.random() * 2000);
            generals[gid].assignedCity = playerChoice.startCity;
            generals[gid].loyalty = 75 + Math.floor(Math.random() * 25);
          }
        } else {
          generals[gid].troops = 2000 + Math.floor(Math.random() * 3000);
          // Assign AI generals to their faction's first city
          const factionCities = Object.values(cities).filter(c => c.owner === f.id);
          if(factionCities.length > 0) {
            generals[gid].assignedCity = factionCities[Math.floor(idx / 2) % factionCities.length].id;
          }
        }
      }
    });
  });
  
  // Armies (expedition forces)
  const armies = [];
  
  G = {
    scenario: sc,
    date: { year: sc.year, month: sc.month, day: 1 },
    cities, factions, generals, armies,
    playerId: playerFactionId,
    playerLeaderId: playerId,
    weather: 'clear',
    season: 'spring',
    events: [],
    log: [],
    selectedCity: null,
    selectedGenerals: [],
    pendingEvents: [],
    dayCount: 0,
    rumors: [],
    aiActions: [],
  };
  
  // Initial relations between factions
  setupInitialRelations(scenarioIdx);
  
  addLog(`⚔️ 게임 시작! ${sc.name} (${sc.year}년 ${sc.month}월)`, 'event');
  addLog(`👤 주인공: ${generals[playerId].name} - ${playerChoice.startCity ? REGION_MAP[playerChoice.startCity].name : ''}에서 출발`, 'success');
  
  return G;
}

function setupInitialRelations(scenarioIdx) {
  if(scenarioIdx === 1) { // 동탁의 폭정
    // Everyone hostile to dong_zhuo
    ['yuan_shao','cao_cao_f','player'].forEach(f => {
      if(G.factions[f] && G.factions['dong_zhuo']) {
        G.factions[f].relations['dong_zhuo'] = {type:'hostile',value:10};
        G.factions['dong_zhuo'].relations[f] = {type:'hostile',value:10};
      }
    });
  }
}

function addLog(msg, type='default') {
  const d = G.date;
  G.log.unshift({ date:`${d.year}년 ${d.month}월 ${d.day}일`, msg, type });
  if(G.log.length > 200) G.log.pop();
  renderLog();
}

function renderMap() {
  const svg = document.getElementById('mapSvg');
  svg.innerHTML = '';
  
  // Background
  const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  bg.setAttribute('width', '800'); bg.setAttribute('height', '650');
  bg.setAttribute('fill', '#0a1020');
  svg.appendChild(bg);
  
  // Grid lines
  for(let x = 0; x <= 800; x += 50) {
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x); line.setAttribute('y1', 0);
    line.setAttribute('x2', x); line.setAttribute('y2', 650);
    line.setAttribute('stroke', 'rgba(201,168,76,0.04)');
    line.setAttribute('stroke-width', '0.5');
    svg.appendChild(line);
  }
  for(let y = 0; y <= 650; y += 50) {
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', 0); line.setAttribute('y1', y);
    line.setAttribute('x2', 800); line.setAttribute('y2', y);
    line.setAttribute('stroke', 'rgba(201,168,76,0.04)');
    line.setAttribute('stroke-width', '0.5');
    svg.appendChild(line);
  }
  
  // Connection lines
  REGIONS.forEach(r => {
    r.adjacent.forEach(adjId => {
      const adj = REGION_MAP[adjId];
      if(!adj) return;
      if(r.id < adjId) { // draw only once
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', r.x); line.setAttribute('y1', r.y);
        line.setAttribute('x2', adj.x); line.setAttribute('y2', adj.y);
        line.setAttribute('stroke', 'rgba(201,168,76,0.12)');
        line.setAttribute('stroke-width', '1');
        svg.appendChild(line);
      }
    });
  });
  
  // Draw army movements
  G.armies.forEach(army => {
    const fromCity = G.cities[army.from];
    const toCity = G.cities[army.to];
    if(!fromCity || !toCity) return;
    const fr = REGION_MAP[army.from];
    const tr = REGION_MAP[army.to];
    if(!fr || !tr) return;
    
    const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    arrow.setAttribute('x1', fr.x); arrow.setAttribute('y1', fr.y);
    arrow.setAttribute('x2', tr.x); arrow.setAttribute('y2', tr.y);
    arrow.setAttribute('stroke', army.factionId === G.playerId ? '#ffd700' : '#ff4444');
    arrow.setAttribute('stroke-width', '2');
    arrow.setAttribute('stroke-dasharray', '5,3');
    arrow.setAttribute('class', 'attack-arrow');
    svg.appendChild(arrow);
    
    // Arrow head
    const dx = tr.x - fr.x, dy = tr.y - fr.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const progress = Math.min(army.progress / army.totalDays, 0.9);
    const px = fr.x + dx * progress;
    const py = fr.y + dy * progress;
    
    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('cx', px); dot.setAttribute('cy', py);
    dot.setAttribute('r', '5');
    dot.setAttribute('fill', army.factionId === G.playerId ? '#ffd700' : '#ff4444');
    dot.setAttribute('stroke', '#fff');
    dot.setAttribute('stroke-width', '1');
    svg.appendChild(dot);
    
    // Troops label
    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', px); label.setAttribute('y', py - 8);
    label.setAttribute('font-size', '8');
    label.setAttribute('fill', '#fff');
    label.setAttribute('text-anchor', 'middle');
    label.textContent = `${(army.troops/1000).toFixed(1)}천`;
    svg.appendChild(label);
  });
  
  // Draw cities
  REGIONS.forEach(r => {
    const city = G.cities[r.id];
    const color = getFactionColor(city.owner);
    const isSelected = G.selectedCity === r.id;
    const isPlayerCity = city.owner === G.playerId;
    
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'city-node' + (isSelected ? ' city-selected' : ''));
    g.setAttribute('data-city', r.id);
    g.addEventListener('click', () => selectCity(r.id));
    g.addEventListener('mouseenter', (e) => showCityTooltip(r.id, e));
    g.addEventListener('mouseleave', hideCityTooltip);
    
    // City size based on importance
    const size = r.population > 35000 ? 10 : r.population > 20000 ? 8 : 6;
    
    // Outer glow for player cities
    if(isPlayerCity) {
      const glow = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      glow.setAttribute('cx', r.x); glow.setAttribute('cy', r.y);
      glow.setAttribute('r', size + 5);
      glow.setAttribute('fill', 'none');
      glow.setAttribute('stroke', color);
      glow.setAttribute('stroke-width', '1');
      glow.setAttribute('opacity', '0.4');
      g.appendChild(glow);
    }
    
    // Main circle
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', r.x); circle.setAttribute('cy', r.y);
    circle.setAttribute('r', size);
    circle.setAttribute('fill', color);
    circle.setAttribute('stroke', isSelected ? '#ffd700' : (isPlayerCity ? '#ffaa00' : 'rgba(255,255,255,0.3)'));
    circle.setAttribute('stroke-width', isSelected ? '2.5' : '1');
    circle.setAttribute('class', 'city-circle');
    g.appendChild(circle);
    
    // City name
    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', r.x); label.setAttribute('y', r.y + size + 10);
    label.setAttribute('class', 'city-label');
    label.setAttribute('font-size', r.population > 30000 ? '10' : '8');
    label.setAttribute('fill', isPlayerCity ? '#ffd700' : '#ccc');
    label.textContent = r.name;
    g.appendChild(label);
    
    // Troops count
    if(city.troops > 0) {
      const tText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      tText.setAttribute('x', r.x); tText.setAttribute('y', r.y + 3);
      tText.setAttribute('class', 'city-troops');
      tText.setAttribute('font-size', '7');
      tText.setAttribute('fill', '#ffd700');
      tText.textContent = city.troops >= 1000 ? `${(city.troops/1000).toFixed(0)}k` : city.troops;
      g.appendChild(tText);
    }
    
    svg.appendChild(g);
  });
  
  // Update mini map
  const miniSvg = document.getElementById('miniMapSvg');
  miniSvg.innerHTML = '';
  REGIONS.forEach(r => {
    const city = G.cities[r.id];
    const color = getFactionColor(city.owner);
    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('cx', r.x); dot.setAttribute('cy', r.y);
    dot.setAttribute('r', '5');
    dot.setAttribute('fill', color);
    miniSvg.appendChild(dot);
  });
}

function showCityTooltip(cityId, e) {
  const city = G.cities[cityId];
  const region = REGION_MAP[cityId];
  const owner = G.factions[city.owner];
  const tip = document.getElementById('hoverInfo');
  tip.style.display = 'block';
  
  // Calculate distance if player has selected city
  let distText = '';
  if(G.selectedCity && G.selectedCity !== cityId) {
    const dist = calcDistance(G.selectedCity, cityId);
    distText = `<div style="color:#ffd700">거리: ${dist}일 행군</div>`;
  }
  
  tip.innerHTML = `
    <div style="color:var(--gold);font-family:'Noto Serif KR';font-size:13px;margin-bottom:5px">${region.name}</div>
    <div style="color:${getFactionColor(city.owner)}">${owner ? owner.name : '중립'}</div>
    <div>지형: ${region.terrain}</div>
    <div>병력: ${city.troops.toLocaleString()}</div>
    <div>방어: ${city.defense}</div>
    ${distText}
  `;
  
  const mapRect = document.getElementById('mapContainer').getBoundingClientRect();
  tip.style.left = (e.clientX - mapRect.left + 15) + 'px';
  tip.style.top = (e.clientY - mapRect.top + 15) + 'px';
}

function hideCityTooltip() {
  document.getElementById('hoverInfo').style.display = 'none';
}

function calcDistance(fromId, toId) {
  // BFS to find path
  const queue = [[fromId, 0]];
  const visited = new Set([fromId]);
  while(queue.length > 0) {
    const [cur, dist] = queue.shift();
    if(cur === toId) return dist;
    const region = REGION_MAP[cur];
    if(region) {
      region.adjacent.forEach(adjId => {
        if(!visited.has(adjId) && REGION_MAP[adjId]) {
          visited.add(adjId);
          queue.push([adjId, dist + 1]);
        }
      });
    }
  }
  return 99;
}

function getRelationClass(fromId, toId) {

}

function getRelationName(fromId, toId) {
  const rel = G.factions[fromId]?.relations[toId];
  if(!rel) return '중립';
  return {allied:'동맹',neutral:'중립',hostile:'적대',vassal:'속국'}[rel.type]||'중립';
}

// =============================================
// NEXT DAY SYSTEM
// =============================================
function nextDay() {
  G.dayCount++;
  G.date.day++;
  if(G.date.day > 30) {
    G.date.day = 1;
    G.date.month++;
    if(G.date.month > 12) {
      G.date.month = 1;
      G.date.year++;
    }
    processMonthly();
  }
  if(G.date.day % 10 === 0) processTenDays();
  
  // Update weather and season
  updateWeatherSeason();
  
  // Process army movements
  processArmies();
  
  // AI turns
  processAI();
  
  // Random events (every 3 days, 15% chance)
  if(G.dayCount % 3 === 0 && Math.random() < 0.15) {
    triggerRandomEvent();
  }
  
  // Advisor advice (every 5 days)
  if(G.dayCount % 5 === 0) {
    giveAdvisorAdvice();
  }
  
  // Food consumption
  processFoodConsumption();
  
  // Loyalty changes
  processLoyalty();
  
  // Rebellion check
  checkRebellion();
  
  // Harvest / tribute (every 30 days)
  if(G.date.day === 1) {
    processHarvest();
  }
  
  renderAll();
}

function updateWeatherSeason() {
  const m = G.date.month;
  if(m >= 3 && m <= 5) G.season = 'spring';
  else if(m >= 6 && m <= 8) G.season = 'summer';
  else if(m >= 9 && m <= 11) G.season = 'fall';
  else G.season = 'winter';
  
  // Random weather
  const weathers = { spring:['clear','clear','clear','rain','fog'], summer:['clear','clear','storm','rain','wind'], fall:['clear','clear','rain','fog','wind'], winter:['clear','snow','snow','fog','wind'] };
  const wlist = weathers[G.season];
  if(Math.random() < 0.15) {
    G.weather = wlist[Math.floor(Math.random()*wlist.length)];
  }
}

function processArmies() {
  const toRemove = [];
  G.armies.forEach(army => {
    army.progress++;
    
    // Increase fatigue
    army.generals.forEach(gid => {
      const gen = G.generals[gid];
      if(gen) gen.fatigue = Math.min(100, gen.fatigue + 5);
    });
    
    // Reduce food
    const foodCost = Math.floor(army.troops * 0.01);
    if(army.factionId === G.playerId) {
      G.factions[G.playerId].food = Math.max(0, G.factions[G.playerId].food - foodCost);
    }
    
    if(army.progress >= army.totalDays) {
      // Arrived - initiate battle
      conductBattle(army);
      toRemove.push(army.id);
    }
  });
  G.armies = G.armies.filter(a => !toRemove.includes(a.id));
}

function conductBattle(army) {
  const targetCity = G.cities[army.to];
  const targetFactionId = targetCity.owner;
  
  if(targetFactionId === army.factionId) {
    // Friendly city - reinforce
    if(army.factionId === G.playerId) {
      targetCity.troops += army.troops;
      addLog(`🏯 ${REGION_MAP[army.to].name}에 증원군 ${army.troops.toLocaleString()}명 도착`, 'success');
    }
    return;
  }
  
  // Battle calculation
  const attackerTroops = army.troops;
  const defenderTroops = targetCity.troops;
  const defBonus = targetCity.defense / 100;
  const terrainBonus = getTerrainBonus(REGION_MAP[army.to].terrain, army.tactic);
  
  // Attacker generals bonus
  let attackerBonus = 1.0;
  army.generals.forEach(gid => {
    const gen = G.generals[gid];
    if(gen) {
      attackerBonus += gen.wu * 0.003 + gen.tong * 0.002;
      if(gen.role === 'advisor') attackerBonus += gen.zhi * 0.002;
    }
  });
  
  // Tactic bonus
  const tacticBonus = getTacticBonus(army.tactic, REGION_MAP[army.to].terrain, G.weather);
  attackerBonus *= tacticBonus;

  // Fatigue penalty from long marches
  const fatigueMult = 1 - Math.min(0.5, (army.fatiguePenalty || 0) / 100);

  // Weather effect
  const weatherEffect = getWeatherEffect(G.weather, army.factionId === G.playerId);

  const attackPower = attackerTroops * attackerBonus * weatherEffect * fatigueMult;
  const defensePower = defenderTroops * (1 + defBonus) * 1.1; // defender always has slight advantage
  
  const attackerWinChance = attackPower / (attackPower + defensePower);
  const rand = Math.random();
  
  const isPlayerInvolved = army.factionId === G.playerId || targetFactionId === G.playerId;
  
  if(rand < attackerWinChance) {
    // Attacker wins
    const losses = Math.floor(defenderTroops * (0.3 + Math.random() * 0.4));
    const attackerLoss = Math.floor(attackerTroops * (0.15 + Math.random() * 0.2));
    const remainingTroops = attackerTroops - attackerLoss;
    
    // Check surrender
    const surrenderChance = defenderTroops < 1000 ? 0.4 : 0.1;
    const surrendered = Math.random() < surrenderChance;
    const capturedTroops = surrendered ? Math.floor(defenderTroops * 0.5) : 0;
    
    const prevOwner = targetCity.owner;
    targetCity.owner = army.factionId;
    targetCity.troops = remainingTroops + capturedTroops;
    
    if(army.factionId === G.playerId) {
      G.factions[G.playerId].fame += 10;
      if(surrendered) {
        G.factions[G.playerId].troops = (G.factions[G.playerId].troops || 0) + capturedTroops;
        addLog(`🎉 ${REGION_MAP[army.to].name} 점령! 항복으로 ${capturedTroops}명 흡수`, 'success');
      } else {
        addLog(`⚔️ ${REGION_MAP[army.to].name} 점령! 공격손실: ${attackerLoss.toLocaleString()}명`, 'success');
      }
    } else if(targetFactionId === G.playerId) {
      G.factions[G.playerId].fame -= 5;
      addLog(`💥 ${REGION_MAP[army.to].name}이(가) ${G.factions[army.factionId]?.name}에게 함락!`, 'combat');
      showNotification(`⚠️ ${REGION_MAP[army.to].name} 함락!`, 'danger');
    } else {
      addLog(`⚔️ ${G.factions[army.factionId]?.name}이(가) ${REGION_MAP[army.to].name} 점령`, 'combat');
    }
    
    // Update general troops
    army.generals.forEach(gid => {
      const gen = G.generals[gid];
      if(gen) {
        gen.troops = Math.max(0, gen.troops - Math.floor(attackerLoss / army.generals.length));
        gen.assignedCity = army.to;
        gen.exp += 50;
        levelUpCheck(gen);
      }
    });
    
  } else {
    // Defender wins
    const attackerLoss = Math.floor(attackerTroops * (0.3 + Math.random() * 0.4));
    const defenderLoss = Math.floor(defenderTroops * (0.1 + Math.random() * 0.2));
    targetCity.troops -= defenderLoss;
    
    army.generals.forEach(gid => {
      const gen = G.generals[gid];
      if(gen) {
        gen.troops = Math.max(0, gen.troops - Math.floor(attackerLoss / army.generals.length));
        gen.assignedCity = army.from;
      }
    });
    
    if(army.factionId === G.playerId) {
      addLog(`💔 ${REGION_MAP[army.to].name} 공략 실패! 손실: ${attackerLoss.toLocaleString()}명`, 'combat');
    } else if(targetFactionId === G.playerId) {
      addLog(`🛡️ ${REGION_MAP[army.to].name} 방어 성공!`, 'success');
    } else {
      addLog(`⚔️ ${G.factions[army.factionId]?.name}의 ${REGION_MAP[army.to].name} 공략 실패`, 'default');
    }
  }
}

function getTacticBonus(tactic, terrain, weather) {
  const bonuses = {
    normal: 1.0,
    surprise: 1.3, // 기습
    ambush: 1.25, // 매복
    fire: terrain === '평야' || terrain === '강변' ? 1.4 : 0.9, // 화공
    feint: 1.15, // 유인
    envelop: 1.2, // 포위
    siege: 0.9, // 공성
  };
  let bonus = bonuses[tactic] || 1.0;
  if(tactic === 'fire' && (weather === 'rain' || weather === 'snow')) bonus *= 0.6;
  if(tactic === 'surprise' && weather === 'fog') bonus *= 1.2;
  return bonus;
}

function getTerrainBonus(terrain, tactic) {
  const def = { 산악: 1.3, 고원: 1.2, 분지: 1.15, 강변: 1.1, 평야: 1.0, 연안: 1.0, 열대: 1.1, 사막: 0.9 };
  return def[terrain] || 1.0;
}

function getWeatherEffect(weather, isAttacker) {
  const eff = { clear: 1.0, rain: 0.9, snow: 0.85, fog: isAttacker ? 1.1 : 0.95, storm: 0.75, wind: 0.95 };
  return eff[weather] || 1.0;
}

function levelUpCheck(gen) {
  const expNeeded = gen.level * 100;
  if(gen.exp >= expNeeded) {
    gen.level++;
    gen.exp -= expNeeded;
    // Stat increase
    gen.wu = Math.min(100, gen.wu + Math.floor(Math.random()*3));
    gen.zhi = Math.min(100, gen.zhi + Math.floor(Math.random()*3));
    gen.tong = Math.min(100, gen.tong + Math.floor(Math.random()*2));
    gen.pol = Math.min(100, gen.pol + Math.floor(Math.random()*2));
    if(gen.factionId === G.playerId) {
      addLog(`⬆️ ${gen.name} 레벨 업! Lv.${gen.level}`, 'success');
    }
  }
}

function processMonthly() {
  // Gold/food income from cities
  getPlayerCities().forEach(city => {
    const income = Math.floor(city.development * city.population / 1000);
    const food = Math.floor(city.development * city.population / 800);
    G.factions[G.playerId].gold += income;
    G.factions[G.playerId].food += food;
  });
  
  // Other factions income
  Object.values(G.factions).forEach(f => {
    if(f.id === G.playerId) return;
    const cities = Object.values(G.cities).filter(c => c.owner === f.id);
    cities.forEach(city => {
      f.gold += Math.floor(city.development * city.population / 1000);
      f.food += Math.floor(city.development * city.population / 800);
    });
  });
  
  addLog(`💰 ${G.date.month}월 - 세수 수입`, 'success');
}

function processTenDays() {
  // Small food consumption
  const gens = getPlayerGenerals();
  const dailyFood = gens.reduce((s,g) => s + Math.floor(g.troops * 0.05), 0);
  G.factions[G.playerId].food = Math.max(0, G.factions[G.playerId].food - dailyFood);
  
  if(G.factions[G.playerId].food < 1000) {
    addLog('⚠️ 군량이 부족합니다!', 'warning');
    showNotification('⚠️ 군량 부족!', 'danger');
    // Troop morale drops
    getPlayerGenerals().forEach(g => { g.morale = Math.max(0, g.morale - 5); });
  }
}

function processHarvest() {
  // Random harvest
  const harvestRate = 0.7 + Math.random() * 0.8; // 0.7~1.5
  const baseHarvest = getPlayerCities().reduce((s,c) => s + c.population, 0) / 10;
  const harvest = Math.floor(baseHarvest * harvestRate);
  G.factions[G.playerId].food += harvest;
  
  const quality = harvestRate > 1.2 ? '풍년' : harvestRate < 0.9 ? '흉년' : '평년';
  addLog(`🌾 수확기 - ${quality}! 군량 +${harvest.toLocaleString()}`, harvestRate > 1.2 ? 'success' : harvestRate < 0.9 ? 'warning' : 'default');
}

function processLoyalty() {
  getPlayerGenerals().forEach(gen => {
    if(gen.id === G.playerLeaderId) return;
    // Loyalty changes based on various factors
    let change = 0;
    if(G.factions[G.playerId].gold > 10000) change += 1;
    if(G.factions[G.playerId].food < 2000) change -= 2;
    if(gen.fatigue > 70) change -= 1;
    // Random small fluctuation
    change += Math.floor(Math.random()*3) - 1;
    gen.loyalty = Math.max(0, Math.min(100, gen.loyalty + change));
  });
}

function checkRebellion() {
  getPlayerGenerals().forEach(gen => {
    if(gen.id === G.playerLeaderId) return;

    // Resignation: loyalty < 25, becomes free agent
    if(gen.loyalty < 25 && gen.loyalty >= 10 && Math.random() < 0.08) {
      addLog(`😤 ${gen.name}이(가) 불만을 품고 사직했다! (충성 ${gen.loyalty})`, 'warning');
      showNotification(`😤 ${gen.name} 사직!`, 'danger');
      const pf = G.factions[G.playerId];
      pf.generals = pf.generals.filter(g => g !== gen.id);
      gen.isRecruited = false;
      gen.factionId = null;
      gen.freeAgent = true;
      gen.rebels = false;
      if(gen.assignedCity && G.cities[gen.assignedCity] && G.cities[gen.assignedCity].owner === G.playerId) {
        G.cities[gen.assignedCity].troops += Math.floor(gen.troops * 0.5);
      }
      gen.troops = 0;
      gen.assignedCity = null;
      return;
    }

    // Rebellion: loyalty < 10
    if(gen.loyalty < 10 && Math.random() < 0.12) {
      addLog(`🔥 ${gen.name}이(가) 반란을 일으켰다!`, 'warning');
      showNotification(`🔥 ${gen.name} 반란 발생!`, 'danger');
      const pf = G.factions[G.playerId];
      pf.generals = pf.generals.filter(g => g !== gen.id);
      gen.isRecruited = false;
      gen.factionId = 'neutral';
      gen.rebels = true;
      gen.freeAgent = false;
      if(gen.assignedCity) {
        G.cities[gen.assignedCity].owner = 'neutral';
        G.cities[gen.assignedCity].troops += gen.troops;
      }
      gen.troops = 0;
      gen.assignedCity = null;
    }
  });
}

function processAI() {
  // AI factions act
  Object.values(G.factions).forEach(f => {
    if(f.id === G.playerId) return;
    const fCities = Object.values(G.cities).filter(c => c.owner === f.id);
    if(fCities.length === 0) return;

    // AI loyalty management: reward generals with low loyalty
    f.generals.forEach(gid => {
      const gen = G.generals[gid];
      if(!gen || !gen.isRecruited) return;
      if(gen.loyalty < 50 && f.gold >= 500 && Math.random() < 0.3) {
        const reward = Math.floor(200 + Math.random() * 500);
        f.gold = Math.max(0, f.gold - reward);
        gen.loyalty = Math.min(100, gen.loyalty + Math.floor(reward / 100));
      }
      // Natural loyalty drift for AI generals
      let drift = (Math.random() * 3) - 1;
      if(f.food < 2000) drift -= 2;
      gen.loyalty = Math.max(0, Math.min(100, gen.loyalty + drift));
    });

    // AI acts every 3-7 days based on random
    if(Math.random() < 0.12) {
      aiDecideAction(f, fCities);
    }
  });
}

function aiDecideAction(faction, cities) {
  // Find best general (advisor) for strategic thinking
  const advisors = faction.generals.map(gid => G.generals[gid]).filter(g => g && g.role === 'advisor');
  const bestAdvisorZhi = advisors.length > 0 ? Math.max(...advisors.map(a => a.zhi)) : 40;
  
  // Higher zhi = better AI decisions
  const strategicThinking = bestAdvisorZhi / 100;
  
  // Options: attack, develop, recruit, diplomacy
  const roll = Math.random();
  
  if(roll < 0.3 + strategicThinking * 0.2) {
    // Attack
    aiAttack(faction, cities, bestAdvisorZhi);
  } else if(roll < 0.6) {
    // Develop / recruit troops
    cities.forEach(city => {
      if(city.troops < city.maxTroops * 0.5) {
        city.troops = Math.min(city.maxTroops, city.troops + Math.floor(1000 + Math.random() * 2000));
      }
    });
  }
}

function aiAttack(faction, cities, advisorZhi) {
  // Find weakest adjacent enemy city
  let bestTarget = null;
  let bestScore = -1;
  let attackFrom = null;
  
  cities.forEach(city => {
    REGION_MAP[city.id]?.adjacent.forEach(adjId => {
      const adjCity = G.cities[adjId];
      if(!adjCity || adjCity.owner === faction.id) return;
      
      // Score: higher = better target (weaker enemy, closer)
      const score = (1000 - adjCity.troops) / 1000 * (advisorZhi / 100 + Math.random());
      if(score > bestScore && city.troops > adjCity.troops * 0.8) {
        bestScore = score;
        bestTarget = adjId;
        attackFrom = city.id;
      }
    });
  });
  
  if(bestTarget && attackFrom) {
    const attackCity = G.cities[attackFrom];
    const sendTroops = Math.floor(attackCity.troops * (0.4 + Math.random() * 0.3));
    if(sendTroops < 500) return;
    
    attackCity.troops -= sendTroops;
    
    // Choose tactic based on advisor intelligence
    const tactics = advisorZhi > 80 ? ['surprise', 'ambush', 'fire', 'envelop'] : ['normal', 'normal', 'surprise'];
    const tactic = tactics[Math.floor(Math.random() * tactics.length)];
    
    const dist = calcDistance(attackFrom, bestTarget);
    
    G.armies.push({
      id: 'army_' + Date.now() + Math.random(),
      factionId: faction.id,
      from: attackFrom, to: bestTarget,
      troops: sendTroops,
      generals: faction.generals.filter(gid => {
        const g = G.generals[gid];
        return g && g.assignedCity === attackFrom;
      }).slice(0, 2),
      tactic: tactic,
      progress: 0,
      totalDays: Math.max(1, dist),
      food: sendTroops * 5,
    });
    
    const targetName = REGION_MAP[bestTarget]?.name;
    const fromName = REGION_MAP[attackFrom]?.name;
    if(G.cities[bestTarget].owner === G.playerId) {
      addLog(`⚠️ ${faction.name}이(가) ${fromName}에서 ${targetName}을(를) 공격!`, 'warning');
      showNotification(`⚔️ ${faction.name}이 ${targetName}을 공격!`, 'danger');
    }
  }
}

function triggerRandomEvent() {
  const event = RANDOM_EVENTS[Math.floor(Math.random() * RANDOM_EVENTS.length)];
  showEventBanner(event);
}

function showEventBanner(event) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.style.zIndex = '650';
  
  overlay.innerHTML = `
    <div class="event-banner">
      <div style="font-size:40px;margin-bottom:10px">${event.icon}</div>
      <h2>${event.title}</h2>
      <p>${event.desc}</p>
      <button class="btn btn-gold" onclick="this.closest('.modal-overlay').remove(); applyEvent('${event.id}')">확인</button>
    </div>
  `;
  
  document.body.appendChild(overlay);
}

function applyEvent(eventId) {
  const event = RANDOM_EVENTS.find(e => e.id === eventId);
  if(event) event.effect(G);
  renderAll();
}

function showEventChoice(msg, choices) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.style.zIndex = '650';
  
  overlay.innerHTML = `
    <div class="event-banner">
      <h2>📜 사건 발생</h2>
      <p>${msg}</p>
      <div style="display:flex;gap:10px;justify-content:center">
        ${choices.map((c,i) => `<button class="btn btn-gold" onclick="this.closest('.modal-overlay').remove(); eventChoices[${i}].action()">${c.text}</button>`).join('')}
      </div>
    </div>
  `;
  
  window.eventChoices = choices;
  document.body.appendChild(overlay);
}

  const allTargets = Object.values(G.cities).filter(c => c.owner !== G.playerId);

      return `<option value="${t.id}">${t.name}${adjTag} — ${t.owner} 병력:${t.troops.toLocaleString()} (${t.dist}일 행군${fatiguePenalty})</option>`;

    .map(g => `<label style="display:flex;align-items:center;gap:5px;padding:3px 0;cursor:pointer">

            <div style="color:var(--gold);font-size:11px;margin-bottom:4px">🎯 공격 목표</div>
            <select id="attackTarget" style="width:100%" onchange="updateAttackTargetInfo()">${targetOptions}</select>

            <option value="fire">화공 (강변/평야 +40%, 비/눈 시 약화)</option>
            <option value="feint">유인 (+15%)</option>
            <option value="envelop">포위 (+20%)</option>
            <option value="siege">공성전 (방어력 50% 무시)</option>
          </select>
        </div>
        <div style="margin-bottom:10px">
          <div style="color:var(--gold);font-size:11px;margin-bottom:4px">출전 장수 <span style="color:var(--text-dim)">(장수 직속 병력 + 성 주둔병 모두 사용 가능)</span></div>
          <div style="background:rgba(0,0,0,0.3);padding:8px;max-height:130px;overflow-y:auto;font-size:11px">

function updateAttackFromInfo() {
  const fromId = document.getElementById('attackFrom')?.value;
  if(!fromId) return;
  const city = G.cities[fromId];
  if(!city) return;
  document.getElementById('attackFromInfo').textContent = `주둔병: ${city.troops.toLocaleString()}명`;
  const slider = document.getElementById('attackTroops');
  if(slider) {
    slider.max = Math.max(100, city.troops);
    slider.value = Math.floor(city.troops * 0.5);
    document.getElementById('attackTroopsVal').textContent = Math.floor(city.troops*0.5).toLocaleString();
    document.getElementById('attackTroopsLabel').textContent = `(주둔병: ${city.troops.toLocaleString()})`;
  }
  // Re-sort target list by distance from new from-city
  const targetSel = document.getElementById('attackTarget');
  if(targetSel) {
    const allTargets = Object.values(G.cities).filter(c => c.owner !== G.playerId);
    const sorted = allTargets.map(c => {
      const r = REGION_MAP[c.id];
      if(!r) return null;
      const dist = calcDistance(fromId, c.id);
      return { id: c.id, name: r.name, owner: G.factions[c.owner]?.name||'중립', troops: c.troops, dist };
    }).filter(Boolean).sort((a,b) => a.dist - b.dist);
    const prevVal = targetSel.value;
    targetSel.innerHTML = sorted.map(t => {
      const adjTag = t.dist === 1 ? ' [인접]' : '';
      const fatiguePenalty = t.dist > 3 ? ` ⚠️피로+${(t.dist-3)*10}%` : '';
      return `<option value="${t.id}" ${t.id === prevVal ? 'selected' : ''}>${t.name}${adjTag} — ${t.owner} 병력:${t.troops.toLocaleString()} (${t.dist}일 행군${fatiguePenalty})</option>`;
    }).join('');
  }
  updateAttackTargetInfo();
}

function updateAttackTargetInfo() {
  const fromId = document.getElementById('attackFrom')?.value;
  const targetId = document.getElementById('attackTarget')?.value;
  if(!fromId || !targetId) return;
  const dist = calcDistance(fromId, targetId);
  const targetCity = G.cities[targetId];
  const targetRegion = REGION_MAP[targetId];
  if(!targetCity || !targetRegion) return;
  const ownerName = G.factions[targetCity.owner]?.name || '중립';
  const fatigue = dist > 3 ? `피로 +${(dist-3)*10}%` : '행군 피로 없음';
  const foodEstimate = (parseInt(document.getElementById('attackTroops')?.value)||1000) * dist * 0.01;
  document.getElementById('attackTargetInfo').textContent =
    `${targetRegion.terrain} · ${ownerName} · 방어 ${targetCity.defense} · ${dist}일 행군 · ${fatigue}`;
  const summary = document.getElementById('attackSummary');
  if(summary) {
    const isAdjacent = dist === 1;
    const warningColor = dist > 5 ? '#ff6b6b' : dist > 3 ? '#ffd700' : '#6bff6b';
    summary.innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">
        <span>행군 거리: <b style="color:${warningColor}">${dist}일</b>${isAdjacent ? ' <span style="color:#6bff6b">[인접]</span>' : ''}</span>
        <span>지형: <b style="color:var(--text)">${targetRegion.terrain}</b></span>
        <span>적 병력: <b style="color:#ff6b6b">${targetCity.troops.toLocaleString()}명</b></span>
        <span>적 방어력: <b style="color:var(--text)">${targetCity.defense}</b></span>
        <span>예상 군량 소모: <b style="color:var(--gold)">~${Math.ceil(foodEstimate).toLocaleString()}석</b></span>
        <span>피로도: <b style="color:${dist>3?'#ff6b6b':'#6bff6b'}">${fatigue}</b></span>
      </div>
      ${dist > 5 ? '<div style="color:#ff6b6b;margin-top:4px">⚠️ 장거리 원정! 군량 소모가 크고 병사 피로도가 심합니다.</div>' : ''}
    `;
  }
}

function executeAttack() {
  const fromId = document.getElementById('attackFrom').value;
  const targetId = document.getElementById('attackTarget').value;
  const tactic = document.getElementById('attackTactic').value;
  const troops = parseInt(document.getElementById('attackTroops').value);
  const food = parseInt(document.getElementById('attackFood').value);

  const selectedGens = Array.from(document.querySelectorAll('#activeModal input[type=checkbox]:checked')).map(cb => cb.value);

  const fromCity = G.cities[fromId];
  if(!fromCity) { showNotification('출발 성을 확인하세요', 'danger'); return; }
  if(fromCity.troops < troops) { showNotification('주둔병이 부족합니다', 'danger'); return; }
  if(G.factions[G.playerId].food < food) { showNotification('군량이 부족합니다', 'danger'); return; }

  // Deduct
  fromCity.troops -= troops;
  G.factions[G.playerId].food -= food;

  const dist = calcDistance(fromId, targetId);

  // Long-distance fatigue penalty baked into army
  const fatiguePenalty = Math.max(0, (dist - 3) * 10); // % attack reduction on arrival

  const army = {
    id: 'army_' + Date.now(),
    factionId: G.playerId,
    from: fromId,
    to: targetId,
    troops: troops,
    generals: selectedGens,
    tactic: tactic,
    progress: 0,
    totalDays: Math.max(1, dist),
    food: food,
    fatiguePenalty: fatiguePenalty,
  };

  // Update general assignments
  selectedGens.forEach(gid => {
    if(G.generals[gid]) {
      G.generals[gid].assignedCity = null;
      G.generals[gid].fatigue = Math.min(100, G.generals[gid].fatigue + fatiguePenalty);
    }
  });

  G.armies.push(army);

  const tacticNames = { normal:'정면공격', surprise:'기습', ambush:'매복', fire:'화공', feint:'유인', envelop:'포위', siege:'공성전' };
  const fatigueNote = fatiguePenalty > 0 ? ` (피로 -${fatiguePenalty}%)` : '';
  addLog(`⚔️ ${REGION_MAP[fromId].name} → ${REGION_MAP[targetId].name} 출전! 병력:${troops.toLocaleString()} 전술:${tacticNames[tactic]} ${dist}일 행군${fatigueNote}`, 'combat');

  closeModal();
  renderAll();
}

          <input type="range" id="recruitCount" min="100" max="${Math.max(100,maxRecruit)}" value="${Math.min(1000,maxRecruit)}" oninput="updateRecruitCost()">
          <div style="display:flex;justify-content:space-between">
            <span id="recruitCountVal" style="color:var(--gold)">${Math.min(1000,maxRecruit)}명</span>
            <span style="color:var(--text-dim)">비용: <span id="recruitCostVal" style="color:var(--gold)">${Math.min(1000,maxRecruit)*5}</span>금</span>
          </div>
        </div>

      <div class="modal-footer">
        <button class="btn btn-gray" onclick="closeModal()">취소</button>
        <button class="btn btn-primary" onclick="executeRecruit()">모집</button>
      </div>
    </div>
  `);
}

function updateRecruitCost() {
  const count = parseInt(document.getElementById('recruitCount').value);
  const type = document.getElementById('troopType');
  const cost = parseInt(type.options[type.selectedIndex].getAttribute('data-cost'));
  document.getElementById('recruitCountVal').textContent = count.toLocaleString() + '명';
  document.getElementById('recruitCostVal').textContent = (count * cost).toLocaleString();
}

function executeRecruit() {
  const count = parseInt(document.getElementById('recruitCount').value);
  const typeEl = document.getElementById('troopType');
  const cost = parseInt(typeEl.options[typeEl.selectedIndex].getAttribute('data-cost'));
  const totalCost = count * cost;
  const pf = G.factions[G.playerId];
  
  if(pf.gold < totalCost) { showNotification('금이 부족합니다', 'danger'); return; }
  
  const city = G.cities[G.selectedCity];
  if(city.troops + count > city.maxTroops) { showNotification('수용 한계 초과', 'danger'); return; }
  
  if(typeEl.value === 'cavalry' && pf.horses < count) { showNotification('군마가 부족합니다', 'danger'); return; }
  if(typeEl.value === 'cavalry') pf.horses -= count;
  
  pf.gold -= totalCost;
  city.troops += count;
  
  addLog(`⚔️ ${REGION_MAP[G.selectedCity].name}에서 ${typeEl.options[typeEl.selectedIndex].text.split('(')[0].trim()} ${count.toLocaleString()}명 모집 (금 -${totalCost.toLocaleString()})`, 'success');
  closeModal();
  renderAll();
}

// RETREAT MODAL
function openRetreatModal() {
  const myArmies = G.armies.filter(a => a.factionId === G.playerId);
  if(myArmies.length === 0) { showNotification('후퇴할 군대가 없습니다', 'danger'); return; }
  
  const armyOptions = myArmies.map(a => {
    const fr = REGION_MAP[a.from];
    const tr = REGION_MAP[a.to];
    return `<option value="${a.id}">${fr?.name} → ${tr?.name} (${a.troops.toLocaleString()}명)</option>`;
  }).join('');
  
  showModal(`
    <div class="modal-box">
      <div class="modal-header">🏃 후퇴 명령
        <span class="modal-close" onclick="closeModal()">✕</span>
      </div>
      <div class="modal-body">
        <div style="color:var(--gold);font-size:11px;margin-bottom:5px">후퇴할 부대</div>
        <select id="retreatArmy" style="width:100%">${armyOptions}</select>
        <div style="margin-top:10px;color:var(--text-dim);font-size:11px">⚠️ 후퇴 시 병력의 20%를 잃습니다</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-gray" onclick="closeModal()">취소</button>
        <button class="btn btn-primary" onclick="executeRetreat()">후퇴</button>
      </div>
    </div>
  `);
}

function executeRetreat() {
  const armyId = document.getElementById('retreatArmy').value;
  cancelArmy(armyId);
  closeModal();
}

function cancelArmy(armyId) {
  const army = G.armies.find(a => a.id === armyId);
  if(!army) return;
  
  const loss = Math.floor(army.troops * 0.2);
  const returnTroops = army.troops - loss;
  
  // Return troops to origin city
  if(G.cities[army.from] && G.cities[army.from].owner === G.playerId) {
    G.cities[army.from].troops += returnTroops;
  }
  
  // Return generals
  army.generals.forEach(gid => {
    const gen = G.generals[gid];
    if(gen) { gen.assignedCity = army.from; gen.troops = Math.floor(gen.troops * 0.8); }
  });
  
  addLog(`🏃 후퇴! 손실 ${loss.toLocaleString()}명, 귀환 ${returnTroops.toLocaleString()}명`, 'warning');
  G.armies = G.armies.filter(a => a.id !== armyId);
  renderAll();
}

          <span style="color:var(--gold);font-size:12px">${gen.name}</span>
          <span style="font-size:10px;color:var(--text-dim)">${getRoleName(gen.role)}</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:2px;font-size:10px;margin-bottom:4px">
          <div style="text-align:center"><div style="color:var(--text-dim)">무</div><div style="color:var(--gold)">${gen.wu}</div></div>
          <div style="text-align:center"><div style="color:var(--text-dim)">지</div><div style="color:var(--gold)">${gen.zhi}</div></div>
          <div style="text-align:center"><div style="color:var(--text-dim)">통</div><div style="color:var(--gold)">${gen.tong}</div></div>
          <div style="text-align:center"><div style="color:var(--text-dim)">정</div><div style="color:var(--gold)">${gen.pol}</div></div>
        </div>

        <button onclick="recruitGeneral('${gen.id}', ${cost})" 
          ${!canAfford || !hasFame ? 'disabled' : ''}
          style="margin-top:4px;width:100%;padding:3px;font-size:10px;background:${canAfford && hasFame ? 'rgba(201,168,76,0.2)' : 'rgba(0,0,0,0.3)'};border:1px solid ${canAfford && hasFame ? 'var(--gold)' : '#333'};color:${canAfford && hasFame ? 'var(--gold)' : 'var(--text-dim)'};cursor:${canAfford && hasFame ? 'pointer' : 'not-allowed'}">
          ${canAfford && hasFame ? '모집' : (canAfford ? '명성 부족' : '금 부족')}
        </button>
      </div>
    `;
  });
  
  html += '</div></div><div class="modal-footer"><button class="btn btn-gray" onclick="closeModal()">닫기</button></div></div>';
  showModal(html);
}

function recruitGeneral(genId, cost) {
  const gen = G.generals[genId];
  const pf = G.factions[G.playerId];
  
  if(pf.gold < cost) { showNotification('금이 부족합니다', 'danger'); return; }
  
  pf.gold -= cost;
  gen.isRecruited = true;
  gen.rebels = false;
  gen.factionId = G.playerId;
  gen.loyalty = 60 + Math.floor(Math.random()*20);
  gen.troops = 500 + Math.floor(Math.random()*1000);
  
  if(!pf.generals.includes(genId)) pf.generals.push(genId);
  
  addLog(`🎉 ${gen.name}이(가) 합류! (금 -${cost.toLocaleString()})`, 'success');
  showNotification(`🎉 ${gen.name} 영입!`, '');
  closeModal();
  renderAll();
}

// DIPLOMACY MODAL
function showDiplomacy() {
  const otherFactions = Object.values(G.factions).filter(f => f.id !== G.playerId && Object.values(G.cities).some(c => c.owner === f.id));
  
  let html = `
    <div class="modal-box" style="max-width:600px">
      <div class="modal-header">🤝 외교
        <span class="modal-close" onclick="closeModal()">✕</span>
      </div>
      <div class="modal-body">
        <table class="diplo-table">
          <thead><tr><th>세력</th><th>관계</th><th>관계값</th><th>행동</th></tr></thead>
          <tbody>
  `;
  
  otherFactions.forEach(f => {
    const rel = G.factions[G.playerId].relations[f.id] || {type:'neutral',value:50};
    const cities = Object.values(G.cities).filter(c => c.owner === f.id).length;
    html += `
      <tr>
        <td style="color:${getFactionColor(f.id)}">${f.name} (${cities})</td>
        <td class="rel-${rel.type}">${getRelationName(G.playerId, f.id)}</td>
        <td>${rel.value}</td>
        <td>
          <button onclick="diploAction('${f.id}','ally')" style="font-size:10px;padding:2px 5px;background:rgba(45,110,45,0.3);border:1px solid #2d6e2d;color:#6bff6b;cursor:pointer;margin:1px">동맹</button>
          <button onclick="diploAction('${f.id}','gift')" style="font-size:10px;padding:2px 5px;background:rgba(201,168,76,0.2);border:1px solid var(--gold);color:var(--gold);cursor:pointer;margin:1px">선물</button>
          <button onclick="diploAction('${f.id}','peace')" style="font-size:10px;padding:2px 5px;background:rgba(70,130,180,0.3);border:1px solid steelblue;color:lightblue;cursor:pointer;margin:1px">강화</button>
          <button onclick="diploAction('${f.id}','war')" style="font-size:10px;padding:2px 5px;background:rgba(139,26,26,0.3);border:1px solid var(--red);color:#ff6b6b;cursor:pointer;margin:1px">선전포고</button>
        </td>
      </tr>
    `;
  });
  
  html += '</tbody></table></div><div class="modal-footer"><button class="btn btn-gray" onclick="closeModal()">닫기</button></div></div>';
  showModal(html);
}

function diploAction(factionId, action) {
  const pf = G.factions[G.playerId];
  const tf = G.factions[factionId];
  if(!pf.relations[factionId]) pf.relations[factionId] = {type:'neutral',value:50};
  if(!tf.relations[G.playerId]) tf.relations[G.playerId] = {type:'neutral',value:50};
  
  if(action === 'ally') {
    if(pf.relations[factionId].value >= 60) {
      pf.relations[factionId].type = 'allied';
      tf.relations[G.playerId].type = 'allied';
      addLog(`🤝 ${tf.name}과(와) 동맹 체결!`, 'diplo');
    } else {
      addLog(`❌ 관계가 좋지 않아 동맹이 거절되었습니다`, 'warning');
    }
  } else if(action === 'gift') {
    const cost = 2000;
    if(pf.gold < cost) { showNotification('금이 부족합니다', 'danger'); return; }
    pf.gold -= cost;
    pf.relations[factionId].value = Math.min(100, pf.relations[factionId].value + 10);
    tf.relations[G.playerId].value = Math.min(100, tf.relations[G.playerId].value + 10);
    addLog(`🎁 ${tf.name}에게 선물 (금 -${cost})! 관계 +10`, 'diplo');
  } else if(action === 'peace') {
    pf.relations[factionId].type = 'neutral';
    tf.relations[G.playerId].type = 'neutral';
    pf.relations[factionId].value = 50;
    tf.relations[G.playerId].value = 50;
    addLog(`☮️ ${tf.name}과(와) 강화 조약`, 'diplo');
  } else if(action === 'war') {
    pf.relations[factionId].type = 'hostile';
    tf.relations[G.playerId].type = 'hostile';
    pf.relations[factionId].value = 0;
    tf.relations[G.playerId].value = 0;
    addLog(`⚔️ ${tf.name}에게 선전포고!`, 'combat');
  }
  closeModal();
  showDiplomacy();
}

          </select>
        </div>

      </div>
    </div>
  `);
}

function executeSendAmbassador() {
  const targetId = document.getElementById('ambassadorTarget').value;
  const purpose = document.getElementById('ambassadorPurpose').value;
  const tf = G.factions[targetId];
  const pf = G.factions[G.playerId];
  
  if(!pf.relations[targetId]) pf.relations[targetId] = {type:'neutral',value:50};
  if(!tf) { closeModal(); return; }
  if(!tf.relations) tf.relations = {};
  if(!tf.relations[G.playerId]) tf.relations[G.playerId] = {type:'neutral',value:50};
  
  const effects = {
    greet: () => { pf.relations[targetId].value = Math.min(100, pf.relations[targetId].value + 5); addLog(`📜 ${tf.name}에 사신 파견 - 친선 방문`, 'diplo'); },
    ally: () => {
      if(pf.gold < 1000) { showNotification('금이 부족합니다', 'danger'); return; }
      pf.gold -= 1000;
      pf.relations[targetId].value = Math.min(100, pf.relations[targetId].value + 10);
      tf.relations[G.playerId].value = Math.min(100, tf.relations[G.playerId].value + 10);
      addLog(`🤝 ${tf.name}에 동맹 제안 (금 -1000)`, 'diplo');
    },
    trade: () => { pf.relations[targetId].value = Math.min(100, pf.relations[targetId].value + 8); addLog(`💹 ${tf.name}과 통상 조약 체결`, 'diplo'); },
    info: () => { addLog(`🕵️ ${tf.name}에 대한 첩보 수집: 금 ${tf.gold.toLocaleString()}, 병력 약 ${Object.values(G.cities).filter(c=>c.owner===targetId).reduce((s,c)=>s+c.troops,0).toLocaleString()}명`, 'diplo'); },
    tribute: () => {
      if(pf.gold < 3000) { showNotification('금이 부족합니다', 'danger'); return; }
      pf.gold -= 3000;
      pf.relations[targetId].value = Math.min(100, pf.relations[targetId].value + 20);
      tf.relations[G.playerId].value = Math.min(100, tf.relations[G.playerId].value + 20);
      addLog(`💰 ${tf.name}에 조공 (금 -3000), 관계 +20`, 'diplo');
    },
    threaten: () => {
      pf.relations[targetId].value = Math.max(0, pf.relations[targetId].value - 20);
      tf.relations[G.playerId].value = Math.max(0, tf.relations[G.playerId].value - 20);
      pf.fame += 5;
      addLog(`⚠️ ${tf.name}에 위협 메시지 전달, 명성 +5`, 'warning');
    },
  };
  
  if(effects[purpose]) effects[purpose]();
  closeModal();
}

function openGiftModal() {

// RUMORS MODAL
function showRumors() {
  const rumors = generateRumors();
  showModal(`
    <div class="modal-box">
      <div class="modal-header">📜 소문
        <span class="modal-close" onclick="closeModal()">✕</span>
      </div>
      <div class="modal-body">
        ${rumors.map(r => `
          <div style="padding:8px;border-bottom:1px solid var(--border);font-size:12px">
            <span style="color:var(--gold)">◆</span> ${r}
          </div>
        `).join('')}
      </div>
      <div class="modal-footer"><button class="btn btn-gray" onclick="closeModal()">닫기</button></div>
    </div>
  `);
}

function generateRumors() {
  const rumors = [];
  const d = G.date;
  const factions = Object.values(G.factions).filter(f => Object.values(G.cities).some(c => c.owner === f.id));
  
  if(factions.length > 0) {
    const f = factions[Math.floor(Math.random()*factions.length)];
    const cities = Object.values(G.cities).filter(c => c.owner === f.id);
    rumors.push(`${f.name}이(가) 군비를 증강하고 있다는 소문이 들린다.`);
    if(cities.length > 0) {
      const c = cities[Math.floor(Math.random()*cities.length)];
      rumors.push(`${REGION_MAP[c.id]?.name}에서 반란의 기운이 감돌고 있다고 한다.`);
    }
  }
  
  rumors.push(`${d.year}년 ${d.month}월, 각지에서 군웅이 할거하고 있다.`);
  
  const factionPairs = [];
  for(let i = 0; i < factions.length - 1; i++) {
    for(let j = i+1; j < factions.length; j++) {
      factionPairs.push([factions[i], factions[j]]);
    }
  }
  if(factionPairs.length > 0) {
    const [f1, f2] = factionPairs[Math.floor(Math.random()*factionPairs.length)];
    rumors.push(`${f1.name}과(와) ${f2.name}의 관계가 심상치 않다는 소문이 있다.`);
  }
  
  const weather = { spring:'봄바람이 불어 전쟁의 기운이 가득하다', summer:'무더운 여름, 병사들의 사기가 떨어지고 있다', fall:'수확의 계절, 군량 확보가 급해진다', winter:'혹독한 겨울, 행군이 매우 어렵다고 한다' };
  rumors.push(weather[G.season]);
  
  return rumors;
}

function getAdvisorAdvice(advisorId) {

          </div>
        </div>
      </div>
      <div class="modal-footer"><button class="btn btn-gray" onclick="closeModal()">닫기</button></div>
    </div>
  `);

function generateAdvice(adv) {
  const zhi = adv.zhi;
  const pf = G.factions[G.playerId];
  const playerCities = getPlayerCities();
  const playerGens = getPlayerGenerals();
  
  const advices = [];
  
  // Military advice
  if(zhi >= 80) {
    const weakEnemies = Object.values(G.cities).filter(c => c.owner !== G.playerId && c.troops < 2000);
    if(weakEnemies.length > 0) {
      const target = weakEnemies.sort((a,b) => a.troops - b.troops)[0];
      advices.push(`지금 ${REGION_MAP[target.id]?.name}이(가) 취약합니다 (병력 ${target.troops.toLocaleString()}). 즉시 공략을 권합니다.`);
    }
    
    if(pf.food < 5000) {
      advices.push(`군량이 부족합니다. 영지 개발이나 수확을 기다리는 것이 현명합니다.`);
    }
    
    if(playerCities.some(c => c.troops < 1000)) {
      advices.push(`일부 영지의 방어력이 취약합니다. 병력을 보강하십시오.`);
    }
  } else if(zhi >= 60) {
    advices.push(`내정을 강화하여 기반을 다지시오.`);
    advices.push(`동맹을 통해 세력을 확대하십시오.`);
  } else {
    advices.push(`...특별한 의견이 없습니다.`);
  }
  
  if(playerGens.length < 3) advices.push(`인재 모집이 시급합니다. 훌륭한 장수들이 아직 재야에 있습니다.`);
  
  const armies = G.armies.filter(a => a.factionId !== G.playerId);
  if(armies.length > 0) {
    const playerTargets = armies.filter(a => G.cities[a.to]?.owner === G.playerId);
    if(playerTargets.length > 0) {
      advices.push(`⚠️ 적군이 우리 영토를 향해 진군 중입니다! 방어를 준비하십시오.`);
    }
  }
  
  return advices.join(' ') || '현재 상황은 안정적입니다. 꾸준한 내정 발전을 권합니다.';
}

function giveAdvisorAdvice() {
  const advisors = getPlayerGenerals().filter(g => g.role === 'advisor');
  if(advisors.length === 0) return;
  const adv = advisors.sort((a,b) => b.zhi - a.zhi)[0];
  const advice = generateAdvice(adv);
  addLog(`💬 ${adv.name}: ${advice.substring(0, 60)}...`, 'diplo');
}
